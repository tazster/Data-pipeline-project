version: '3.8'

services:
  # 1. DATABASE LAYER: The Live PostgreSQL Database Server
  postgres_db:
    image: postgres:16-alpine
    container_name: f1_postgres_server
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=f1password
      - POSTGRES_DB=f1_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d f1_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. INFRASTRUCTURE LAYER: Apache Zookeeper
  zookeeper:
    image: bitnamilegacy/zookeeper:latest
    container_name: f1_zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"

  # 3. INFRASTRUCTURE LAYER: Apache Kafka Broker
  kafka:
    image: bitnamilegacy/kafka:3.4
    container_name: f1_kafka
    depends_on:
      - zookeeper
    environment:
      - KAFKA_CFG_BROKER_ID=1
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "127.0.0.1:9092", "--list"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 4. APPLICATION LAYER: The Continuous Live Consumer Engine
  f1_consumer:
    build: .
    container_name: f1_live_consumer
    # FIXED: Directing Docker to map specifically to your custom script filename
    command: python Kafka_consumer.py
    restart: on-failure
    depends_on:
      postgres_db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:f1password@postgres_db:5432/f1_analytics
      - KAFKA_BROKER=kafka:9092

  # 5. APPLICATION LAYER: The Live Polling API Requestor
  f1_producer:
    build: .
    container_name: f1_live_producer
    # FIXED: Directing Docker to map specifically to your custom script filename
    command: python Kafka_producer.py
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      - KAFKA_BROKER=kafka:9092

volumes:
  postgres_data:
