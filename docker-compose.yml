services:
  # The Live PostgreSQL Database Server
  postgres_db:
    image: postgres:16-alpine
    container_name: f1_postgres_server
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=f1password
      - POSTGRES_DB=f1_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Added healthcheck so the pipeline waits until Postgres is fully initialized
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d f1_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: bitnamilegacy/zookeeper:latest
    container_name: f1_zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"

  kafka:
    image: bitnamilegacy/kafka:3.4
    container_name: f1_kafka
    depends_on:
      - zookeeper
    environment:
      # Bitnami environment variables configuration to fix the unbound variable crash
      - KAFKA_CFG_BROKER_ID=1
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
    # Added healthcheck so the pipeline waits until Kafka is actually accepting traffic
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "127.0.0.1:9092", "--list"]
      interval: 5s
      timeout: 5s
      retries: 5

  f1_pipeline:
    build: .
    container_name: f1_api_worker
    # Corrected syntax for multiple sequential condition dependencies
    depends_on:
      postgres_db:
        condition: service_healthy
      zookeeper:
        condition: service_started
      kafka:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:f1password@postgres_db:5432/f1_analytics
      - KAFKA_BROKER=kafka:9092

volumes:
  postgres_data: